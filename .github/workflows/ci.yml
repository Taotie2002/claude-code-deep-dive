name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          cd mini-claude-code && pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check mini-claude-code/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          cd mini-claude-code && pip install -r requirements.txt

      - name: Run tests
        run: |
          cd mini-claude-code && python -m pytest tests/ -v

  test_llm_as_judge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
          cd mini-claude-code && pip install -r requirements.txt

      - name: Run LLM-as-Judge evaluation
        run: |
          cd mini-claude-code && python -m pytest tests/test_llm_as_judge/ -v || echo "No llm_as_judge tests yet"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd mini-claude-code && docker build . -t test

      - name: Verify docker-compose
        run: |
          cd mini-claude-code && docker-compose config --quiet || echo "docker-compose.yml validation skipped"
